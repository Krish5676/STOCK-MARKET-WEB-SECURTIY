<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {background: linear-gradient(135deg,#0f172a,#1e293b);font-family: Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
        .box {background:#1e293b;padding:30px;border-radius:12px;width:340px;box-shadow:0 0 20px rgba(0,0,0,0.5);}
        h2 {color:white;text-align:center;}
        .input-box {position:relative;margin:10px 0;}
        .input-box i {position:absolute;top:12px;left:10px;color:#94a3b8;}
        input {width:100%;padding:10px 10px 10px 35px;background:#334155;border:none;border-radius:6px;color:white;}
        button {width:100%;padding:10px;background:#22c55e;border:none;border-radius:6px;color:white;}
        a {color:#38bdf8;}
    </style>
</head>
<body>

<div class="box">
<h2><i class="fas fa-user-plus"></i> Signup</h2>
<form method="POST" enctype="multipart/form-data">

<div class="input-box"><i class="fas fa-user"></i><input name="username" placeholder="Username" required></div>
<div class="input-box"><i class="fas fa-envelope"></i><input name="email" placeholder="Email" required></div>
<div class="input-box"><i class="fas fa-phone"></i><input name="mobile" placeholder="Mobile" required></div>
<div class="input-box"><i class="fas fa-lock"></i><input type="password" name="password" placeholder="Password" required></div>
<div class="input-box"><i class="fas fa-lock"></i><input type="password" name="confirm" placeholder="Confirm Password" required></div>

<input type="file" name="photo">

<button type="submit"><i class="fas fa-user-check"></i> Create Account</button>

<p style="text-align:center;">Already? <a href="/login">Login</a></p>

</form>
</div>

</body>
</html>
