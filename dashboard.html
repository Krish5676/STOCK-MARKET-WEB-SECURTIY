<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fas fa-chart-line"></i> TradeX</h2>

    <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/trade"><i class="fas fa-chart-line"></i> Trade</a>
    <a href="#"><i class="fas fa-history"></i> History</a>
    <a href="/login"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="header">
        <h2>Welcome {{user.username}}</h2>
    </div>

    <div class="cards">
        <div class="card">
            <h3><i class="fas fa-wallet"></i> Balance</h3>
            <p>₹{{user.balance}}</p>
        </div>

        <div class="card">
            <h3><i class="fas fa-user"></i> Profile</h3>
            <img src="/static/images/{{user.photo}}" width="80">
        </div>
    </div>

</div>

</div>

</body>
</html>
