<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box i {
            position: absolute;
            top: 12px;
            left: 10px;
            color: #94a3b8;
        }

        .input-box input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border: none;
            border-radius: 6px;
            outline: none;
            background: #334155;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .links {
            text-align: center;
            margin-top: 15px;
        }

        .links a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2><i class="fas fa-user-lock"></i> Login</h2>

    <form method="POST">
        
        <div class="input-box">
            <i class="fas fa-user"></i>
            <input type="text" name="user" placeholder="Username or Email" required>
        </div>

        <div class="input-box">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <div class="links">
            <p><a href="/unblock"><i class="fas fa-unlock"></i> Unblock Account</a></p>
            <p><a href="/"><i class="fas fa-user-plus"></i> Create Account</a></p>
        </div>

    </form>
</div>

</body>
</html>
